<svg width="200" height="200" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>NexFlow Logo</title>
  <desc>NexFlow logo - workflow nodes connected by flowing arrows in blue</desc>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="120" y="300" width="80" height="80" rx="16" fill="#1d4ed8"/>
  <rect x="300" y="180" width="80" height="80" rx="16" fill="#2563eb"/>
  <rect x="300" y="420" width="80" height="80" rx="16" fill="#2563eb"/>
  <rect x="480" y="300" width="80" height="80" rx="16" fill="#60a5fa"/>

