  <line x1="200" y1="350" x2="300" y2="435" stroke="#2563eb" fill="none" stroke-width="6" stroke-linecap="round" marker-end="url(#a)"/>
  <line x1="380" y1="245" x2="480" y2="330" stroke="#2563eb" fill="none" stroke-width="6" stroke-linecap="round" marker-end="url(#a)"/>
  <line x1="380" y1="435" x2="480" y2="350" stroke="#2563eb" fill="none" stroke-width="6" stroke-linecap="round" marker-end="url(#a)"/>
</svg>
